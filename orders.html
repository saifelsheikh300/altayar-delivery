<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',Arial,sans-serif!important}
:root{
  --orange:#FF4500;--orange-dark:#CC3700;--orange-light:#FF6A33;
  --orange-glow:rgba(255,69,0,0.1);--bg:#0F0F0F;--card:#1A1A1A;
  --card2:#222;--border:#2A2A2A;--text:#F0F0F0;--text-mid:#AAA;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;
}
body{background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}

/* HEADER */
header{background:linear-gradient(135deg,var(--orange-dark),var(--orange));padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(255,69,0,.4)}
.header-inner{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:13px 20px}
.header-left{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text .t1{font-size:20px;font-weight:900;color:#fff}
.logo-text .t2{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px}
.live-dot{width:9px;height:9px;background:var(--green);border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-size:13px;font-weight:700;color:var(--green)}
.orders-count{background:rgba(255,255,255,.15);border-radius:50px;padding:5px 14px;font-size:13px;font-weight:700;color:#fff}

/* STATS BAR */
.stats-bar{max-width:1100px;margin:18px auto 0;padding:0 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:26px;font-weight:900;margin-bottom:3px}
.stat-label{font-size:12px;color:var(--text-mid);font-weight:600}
.s-new{color:var(--orange)}.s-progress{color:var(--yellow)}.s-done{color:var(--green)}.s-all{color:var(--blue)}

/* FILTERS */
.filters{max-width:1100px;margin:14px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;font-size:13px;font-weight:700;color:var(--text-mid);cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.search-box{flex:1;min-width:180px;background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;font-size:13px;color:var(--text);outline:none;direction:rtl}
.search-box:focus{border-color:var(--orange)}
.search-box::placeholder{color:var(--text-mid)}

/* ORDERS GRID */
.orders-section{max-width:1100px;margin:16px auto 40px;padding:0 16px}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* ORDER CARD */
.order-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;transition:transform .15s,box-shadow .15s;animation:slide-in .3s ease}
@keyframes slide-in{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.order-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.order-card.new{border-right:4px solid var(--orange);animation:slide-in .3s ease,new-pulse 2s ease 3}
@keyframes new-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(255,69,0,.4)}}

.order-top{background:var(--card2);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.order-id{font-size:11px;color:var(--text-mid);font-weight:600}
.order-time{font-size:11px;color:var(--text-mid)}
.status-badge{border-radius:50px;padding:4px 12px;font-size:11px;font-weight:800}
.s-جديد{background:rgba(255,69,0,.15);color:var(--orange)}
.s-جاري{background:rgba(245,158,11,.15);color:var(--yellow)}
.s-تم{background:rgba(34,197,94,.15);color:var(--green)}
.s-ملغي{background:rgba(239,68,68,.15);color:var(--red)}

.order-body{padding:14px}
.client-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.client-avatar{width:36px;height:36px;background:var(--orange-glow);border:1.5px solid var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.client-name{font-size:15px;font-weight:800}
.client-phone{font-size:12px;color:var(--text-mid);font-weight:600}

.addr-row{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
.addr-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;font-weight:600}
.addr-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.addr-text{color:var(--text-mid);flex:1;line-height:1.5}

.details-text{font-size:13px;color:var(--text);font-weight:600;line-height:1.6;margin-bottom:10px;background:var(--bg);border-radius:8px;padding:9px 11px}

.order-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.meta-chip{background:var(--card2);border:1px solid var(--border);border-radius:50px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--text-mid)}

.order-actions{display:flex;gap:8px}
.action-btn{flex:1;border:none;border-radius:10px;padding:9px;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-progress{background:rgba(245,158,11,.15);color:var(--yellow)}
.btn-progress:hover{background:var(--yellow);color:#000}
.btn-done{background:rgba(34,197,94,.15);color:var(--green)}
.btn-done:hover{background:var(--green);color:#fff}
.btn-cancel{background:rgba(239,68,68,.1);color:var(--red)}
.btn-cancel:hover{background:var(--red);color:#fff}
.btn-call{background:rgba(59,130,246,.15);color:var(--blue)}
.btn-call:hover{background:var(--blue);color:#fff}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-mid)}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.5}
.empty-text{font-size:16px;font-weight:700}

/* LOADING */
.loading-state{text-align:center;padding:60px;color:var(--text-mid)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* NOTIFICATION */
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--orange);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:800;z-index:999;animation:notif-in .3s ease;display:none;white-space:nowrap}
.notif.show{display:block}
@keyframes notif-in{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

.btn-whatsapp{background:rgba(37,211,102,.15);color:#25d366}
.btn-whatsapp:hover{background:#25d366;color:#fff}

@media(max-width:600px){.stats-bar{grid-template-columns:1fr 1fr}.orders-grid{grid-template-columns:1fr}.stat-num{font-size:20px}}
</style>
</head>

<script>
(function(){
  // لو بيتفتح locally (file://) اعمل session تجريبي تلقائي
  if (window.location.protocol === 'file:') {
    if (!sessionStorage.getItem('altayar_user')) {
      sessionStorage.setItem('altayar_user', JSON.stringify({
        username:'superadmin', name:'سوبر أدمن', role:'super',
        canAccess:['admin.html','orders.html','index.html']
      }));
    }
  }
  var u = sessionStorage.getItem('altayar_user');
  if (!u) { window.location.href='login.html'; return; }
  var user = JSON.parse(u);
  if (!user.canAccess || user.canAccess.indexOf('orders.html') === -1) {
    alert('⛔ مش معاك صلاحية لهذه الصفحة');
    window.location.href='login.html'; return;
  }
  window.__altayar_user = user;
})();
</script>

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ⚠️ ضع بيانات Firebase هنا (نفس index.html)
const firebaseConfig = {
  apiKey: "AIzaSyBuKW9vBGj_q1LIE5QrRtFmpsJ5Ifg6D4w",
  authDomain: "altayar-delivery.firebaseapp.com",
  projectId: "altayar-delivery",
  storageBucket: "altayar-delivery.firebasestorage.app",
  messagingSenderId: "244765017519",
  appId: "1:244765017519:web:62ded292f78c9be40c5b5a"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let allOrders   = [];
let currentFilter = 'all';
let isFirstLoad = true;

// Real-time listener
const q = query(collection(db,'orders'), orderBy('createdAt','desc'));
onSnapshot(q, snapshot => {
  const prev = allOrders.length;
  allOrders  = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

  if (!isFirstLoad && allOrders.length > prev) {
    const newest = allOrders[0];
    showNotif('🔔 طلب جديد وصل!');
    sendPushNotif(newest);
    try { new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3').play(); } catch(e){}
  }
  isFirstLoad = false;

  updateStats();
  renderOrders();
  document.getElementById('loading').style.display = 'none';
});

function updateStats() {
  const today = new Date().toDateString();
  const todayOrders = allOrders.filter(o => {
    if (!o.createdAt) return false;
    return new Date(o.createdAt.seconds*1000).toDateString() === today;
  });
  document.getElementById('stat-new').textContent      = todayOrders.filter(o=>o.status==='جديد').length;
  document.getElementById('stat-progress').textContent = todayOrders.filter(o=>o.status==='جاري').length;
  document.getElementById('stat-done').textContent     = todayOrders.filter(o=>o.status==='تم').length;
  document.getElementById('stat-all').textContent      = todayOrders.length;
  document.getElementById('total-count').textContent   = allOrders.length + ' طلب';
}

window.renderOrders = function() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let filtered = allOrders.filter(o => {
    if (currentFilter !== 'all' && o.status !== currentFilter) return false;
    if (search && !o.name?.toLowerCase().includes(search) && !o.phone?.includes(search)) return false;
    return true;
  });

  const grid  = document.getElementById('orders-grid');
  const empty = document.getElementById('empty-state');

  if (filtered.length === 0) {
    grid.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }

  grid.style.display  = 'grid';
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(o => orderCard(o)).join('');
};

function orderCard(o) {
  const time = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '';
  const isNew = o.status === 'جديد';
  return `
  <div class="order-card ${isNew?'new':''}">
    <div class="order-top">
      <span class="order-id">#${o.id.slice(-6).toUpperCase()}</span>
      <span class="status-badge s-${o.status}">${o.status}</span>
      <span class="order-time">${time}</span>
    </div>
    <div class="order-body">
      <div class="client-row">
        <div class="client-avatar">👤</div>
        <div>
          <div class="client-name">${o.name || '-'}</div>
          <div class="client-phone">📞 ${o.phone || '-'}</div>
        </div>
      </div>
      <div class="addr-row">
        <div class="addr-item"><span class="addr-icon">📦</span><span class="addr-text">${o.from || '-'}</span></div>
        <div class="addr-item"><span class="addr-icon">🏠</span><span class="addr-text">${o.to || '-'}</span></div>
      </div>
      <div class="details-text">${o.details || '-'}</div>
      <div class="order-meta">
        ${o.type ? `<span class="meta-chip">${o.type}</span>` : ''}
        ${o.amount ? `<span class="meta-chip">💰 ${o.amount} ج</span>` : ''}
        ${o.time ? `<span class="meta-chip">🕐 ${o.time}</span>` : ''}
        ${o.notes ? `<span class="meta-chip">📝 ${o.notes}</span>` : ''}
      </div>
      <div class="order-actions">
        <button class="action-btn btn-call" onclick="callClient('${o.phone}')">📞 اتصال</button>
        <button class="action-btn btn-whatsapp" onclick="sendWhatsApp(${JSON.stringify(o).replace(/"/g,'&quot;')})">💬 واتساب</button>
        ${o.status==='جديد'  ? `<button class="action-btn btn-progress" onclick="updateStatus('${o.id}','جاري')">⚡ جاري</button>` : ''}
        ${o.status!=='تم' && o.status!=='ملغي' ? `<button class="action-btn btn-done" onclick="updateStatus('${o.id}','تم')">✅ تم</button>` : ''}
        ${o.status!=='ملغي' && o.status!=='تم' ? `<button class="action-btn btn-cancel" onclick="updateStatus('${o.id}','ملغي')">❌ إلغاء</button>` : ''}
      </div>
    </div>
  </div>`;
}

window.updateStatus = async function(id, status) {
  try {
    await updateDoc(doc(db,'orders',id), { status });
    showNotif(`✅ تم تغيير الحالة لـ "${status}"`);
  } catch(e) { alert('❌ خطأ في التحديث'); }
};

window.callClient = function(phone) {
  if (phone) window.open(`tel:${phone}`);
};

window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
};

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3000);
}

// ── واتساب ──
window.sendWhatsApp = function(o) {
  const phone = (o.phone || '').replace(/[^0-9]/g,'');
  let wa = phone;
  if (wa.startsWith('0')) wa = '2' + wa;
  if (!wa.startsWith('20')) wa = '20' + wa;

  // تحميل إعدادات الواتساب من الأدمن
  let cfg = {};
  try {
    const s = JSON.parse(localStorage.getItem('altayar_settings') || '{}');
    cfg = s.waSettings || {};
  } catch(e){}

  const show    = key => cfg[key] !== false;
  const sep     = cfg.separator   || '━━━━━━━━━━━━━━';
  const header  = cfg.headerText  || '🛵 *الطيار ديليفري*';
  const footer  = cfg.footerText  || '✅ شكراً للطيار ديليفري ✈️';

  const lines = [];
  if (show('header'))  { lines.push(header); lines.push(sep); }
  if (show('name'))    lines.push(`👤 *العميل:* ${o.name||'-'}`);
  if (show('phone'))   lines.push(`📞 *التليفون:* ${o.phone||'-'}`);
  if (show('from')||show('to')) lines.push(sep);
  if (show('from'))    lines.push(`📦 *الاستلام من:*\n${o.from||'-'}`);
  if (show('to'))      lines.push(`🏠 *التوصيل لـ:*\n${o.to||'-'}`);
  lines.push(sep);
  if (show('details') && o.details) lines.push(`📋 *الطلب:*\n${o.details}`);
  if (show('type')   && o.type)     lines.push(`🏷️ *النوع:* ${o.type}`);
  if (show('amount') && o.amount)   lines.push(`💰 *المبلغ:* ${o.amount} جنيه`);
  if (show('time')   && o.time)     lines.push(`🕐 *الوقت:* ${o.time}`);
  if (show('notes')  && o.notes)    lines.push(`📝 *ملاحظات:* ${o.notes}`);
  if (show('footer')) { lines.push(sep); lines.push(footer); }

  const msg = lines.join('\n');
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(msg)}`, '_blank');
};

// ── إشعارات Push ──
let notifPermission = false;

async function requestNotifPermission() {
  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  notifPermission = perm === 'granted';
  const btn = document.getElementById('notif-toggle-btn');
  if (btn) {
    btn.textContent = notifPermission ? '🔔 الإشعارات شغالة' : '🔕 فعّل الإشعارات';
    btn.style.background = notifPermission ? 'rgba(34,197,94,.2)' : 'rgba(255,255,255,.1)';
    btn.style.color = notifPermission ? '#22c55e' : '#fff';
  }
}

function sendPushNotif(order) {
  if (!notifPermission) return;
  const n = new Notification('🛵 طلب جديد — الطيار!', {
    body: `👤 ${order.name || 'عميل جديد'}\n📦 ${order.from || ''} ← 🏠 ${order.to || ''}`,
    icon: 'https://raw.githubusercontent.com/saifelsheikh300/altayar-delivery/main/icon.png',
    badge: 'https://raw.githubusercontent.com/saifelsheikh300/altayar-delivery/main/icon.png',
    tag: order.id,
    requireInteraction: true
  });
  n.onclick = () => { window.focus(); n.close(); };
}

// تفعيل الإشعارات لو كانت موافق عليها قبل كده
if ('Notification' in window && Notification.permission === 'granted') {
  notifPermission = true;
}

// ── User badge + logout ──
window.doLogout = function() {
  if (confirm('عايز تخرج؟')) {
    sessionStorage.removeItem('altayar_user');
    window.location.href = 'login.html';
  }
};

// Show user name in header
(function(){
  const u = window.__altayar_user;
  if (!u) return;
  const badge = document.getElementById('user-badge');
  if (badge) {
    const icons = { super: '👑', admin: '🧑‍💼', driver: '🛵' };
    badge.textContent = (icons[u.role] || '👤') + ' ' + u.name;
  }
})();
</script>
</body>
