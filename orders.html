<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF4500">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>الطيار - الأوردرات</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',Arial,sans-serif!important}
:root{
  --orange:#FF4500;--orange-dark:#CC3700;--orange-light:#FF6A33;
  --orange-glow:rgba(255,69,0,0.1);--bg:#0F0F0F;--card:#1A1A1A;
  --card2:#222;--border:#2A2A2A;--text:#F0F0F0;--text-mid:#AAA;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;
}
body{background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}

/* HEADER */
header{background:linear-gradient(135deg,var(--orange-dark),var(--orange));padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(255,69,0,.4)}
.header-inner{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:13px 20px}
.header-left{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text .t1{font-size:20px;font-weight:900;color:#fff}
.logo-text .t2{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px}
.live-dot{width:9px;height:9px;background:var(--green);border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-size:13px;font-weight:700;color:var(--green)}
.orders-count{background:rgba(255,255,255,.15);border-radius:50px;padding:5px 14px;font-size:13px;font-weight:700;color:#fff}

/* STATS BAR */
.stats-bar{max-width:1100px;margin:18px auto 0;padding:0 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:26px;font-weight:900;margin-bottom:3px}
.stat-label{font-size:12px;color:var(--text-mid);font-weight:600}
.s-new{color:var(--orange)}.s-progress{color:var(--yellow)}.s-done{color:var(--green)}.s-all{color:var(--blue)}

/* FILTERS */
.filters{max-width:1100px;margin:14px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;font-size:13px;font-weight:700;color:var(--text-mid);cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.search-box{flex:1;min-width:180px;background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;font-size:13px;color:var(--text);outline:none;direction:rtl}
.search-box:focus{border-color:var(--orange)}
.search-box::placeholder{color:var(--text-mid)}

/* ORDERS GRID */
.orders-section{max-width:1100px;margin:16px auto 40px;padding:0 16px}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* ORDER CARD */
.order-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;transition:transform .15s,box-shadow .15s;animation:slide-in .3s ease}
@keyframes slide-in{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.order-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.order-card.new{border-right:4px solid var(--orange);animation:slide-in .3s ease,new-pulse 2s ease 3}
@keyframes new-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(255,69,0,.4)}}

.order-top{background:var(--card2);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.order-id{font-size:11px;color:var(--text-mid);font-weight:600}
.order-time{font-size:11px;color:var(--text-mid)}
.status-badge{border-radius:50px;padding:4px 12px;font-size:11px;font-weight:800}
.s-جديد{background:rgba(255,69,0,.15);color:var(--orange)}
.s-جاري{background:rgba(245,158,11,.15);color:var(--yellow)}
.s-تم{background:rgba(34,197,94,.15);color:var(--green)}
.s-ملغي{background:rgba(239,68,68,.15);color:var(--red)}

.order-body{padding:14px}
.client-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.client-avatar{width:36px;height:36px;background:var(--orange-glow);border:1.5px solid var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.client-name{font-size:15px;font-weight:800}
.client-phone{font-size:12px;color:var(--text-mid);font-weight:600}

.addr-row{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
.addr-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;font-weight:600}
.addr-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.addr-text{color:var(--text-mid);flex:1;line-height:1.5}

.details-text{font-size:13px;color:var(--text);font-weight:600;line-height:1.6;margin-bottom:10px;background:var(--bg);border-radius:8px;padding:9px 11px}

.order-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.meta-chip{background:var(--card2);border:1px solid var(--border);border-radius:50px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--text-mid)}

.order-actions{display:flex;gap:8px}
.action-btn{flex:1;border:none;border-radius:10px;padding:9px;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-progress{background:rgba(245,158,11,.15);color:var(--yellow)}
.btn-progress:hover{background:var(--yellow);color:#000}
.btn-done{background:rgba(34,197,94,.15);color:var(--green)}
.btn-done:hover{background:var(--green);color:#fff}
.btn-cancel{background:rgba(239,68,68,.1);color:var(--red)}
.btn-cancel:hover{background:var(--red);color:#fff}
.btn-call{background:rgba(59,130,246,.15);color:var(--blue)}
.btn-call:hover{background:var(--blue);color:#fff}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-mid)}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.5}
.empty-text{font-size:16px;font-weight:700}

/* LOADING */
.loading-state{text-align:center;padding:60px;color:var(--text-mid)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* NOTIFICATION */
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--orange);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:800;z-index:999;animation:notif-in .3s ease;display:none;white-space:nowrap}
.notif.show{display:block}
@keyframes notif-in{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

.btn-whatsapp{background:rgba(37,211,102,.15);color:#25d366}
.btn-whatsapp:hover{background:#25d366;color:#fff}

/* 3 نقط */
.dot-menu-wrap{position:relative;margin-right:auto;z-index:10}
.dot-menu-btn{background:transparent;border:none;color:var(--text-mid);font-size:22px;cursor:pointer;padding:2px 8px;line-height:1;border-radius:6px;transition:background .15s}
.dot-menu-btn:hover{background:var(--card2);color:var(--text)}
.dot-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#222;border:1px solid var(--border);border-radius:10px;min-width:170px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.6);overflow:hidden}
.dot-menu.open{display:block}
.dot-menu button{display:block;width:100%;background:transparent;border:none;color:var(--text);font-size:13px;font-weight:700;padding:12px 16px;text-align:right;cursor:pointer;transition:background .15s;white-space:nowrap}
.dot-menu button:hover{background:var(--card2)}

/* السماح للقائمة بالظهور برا حدود الكارت */
.order-card{overflow:visible}
.order-top{position:relative;overflow:visible}

/* ═══════ RESPONSIVE BREAKPOINTS ═══════ */

/* موبايل صغير */
@media(max-width:480px){
  .stats-bar{grid-template-columns:1fr 1fr;gap:8px}
  .orders-grid{grid-template-columns:1fr}
  .stat-num{font-size:20px}
  .header-inner{padding:10px 14px;flex-wrap:wrap;gap:8px}
  .filters{gap:6px}
  .filter-btn{padding:6px 12px;font-size:12px}
  .dot-menu{left:auto;right:0;min-width:150px}
}

/* موبايل كبير / تابلت صغير */
@media(min-width:481px) and (max-width:768px){
  .stats-bar{grid-template-columns:repeat(4,1fr)}
  .orders-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
}

/* تابلت */
@media(min-width:769px) and (max-width:1024px){
  .orders-section{max-width:95%}
  .orders-grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .stats-bar{max-width:95%}
  .filters{max-width:95%}
  .dot-menu{min-width:180px}
}

/* كمبيوتر / شاشات كبيرة */
@media(min-width:1025px){
  .orders-section{max-width:1300px}
  .orders-grid{grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}
  .stats-bar{max-width:1300px}
  .filters{max-width:1300px}
  .header-inner{max-width:1300px}
}
</style>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="logo-icon">🛵</div>
      <div class="logo-text">
        <div class="t1">الطيار</div>
        <div class="t2">لوحة الأوردرات</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <span class="live-label">مباشر</span>
      <button id="notif-toggle-btn" onclick="requestNotifPermission()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 12px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">🔕 فعّل الإشعارات</button>
      <span class="orders-count" id="total-count">0 طلب</span>

    </div>

</header>

<div class="stats-bar">
  <div class="stat-card"><div class="stat-num s-new" id="stat-new">0</div><div class="stat-label">جديد</div></div>
  <div class="stat-card"><div class="stat-num s-progress" id="stat-progress">0</div><div class="stat-label">جاري</div></div>
  <div class="stat-card"><div class="stat-num s-done" id="stat-done">0</div><div class="stat-label">تم التوصيل</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBuKW9vBGj_q1LIE5QrRtFmpsJ5Ifg6D4w",
  authDomain: "altayar-delivery.firebaseapp.com",
  projectId: "altayar-delivery",
  storageBucket: "altayar-delivery.firebasestorage.app",
  messagingSenderId: "244765017519",
  appId: "1:244765017519:web:62ded292f78c9be40c5b5a"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

let allOrders     = [];
let currentFilter = 'all';
let staffList     = []; // كل المناديب/الأدمنز اللي ممكن نعين عليهم أوردر
let isFirstLoad   = true;
let unsubscribe   = null;
let authResolved  = false; // منع redirect قبل ما Firebase يحمل الـ session

function startListening() {
  if (unsubscribe) unsubscribe();
  const q = query(collection(db,'orders'), orderBy('createdAt','desc'));
  unsubscribe = onSnapshot(q, snapshot => {
    const prev = allOrders.length;
    allOrders  = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!isFirstLoad && allOrders.length > prev) {
      showNotif('🔔 طلب جديد وصل!');
      sendPushNotif(allOrders[0]);
      try { new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3').play(); } catch(e){}
    }
    isFirstLoad = false;
    updateStats();
    renderOrders();
    document.getElementById('loading').style.display = 'none';
  }, error => {
    console.error('Firestore:', error.code);
    document.getElementById('loading').innerHTML =
      `<div style="color:#ef4444;text-align:center;padding:20px">
        <div style="font-size:32px;margin-bottom:10px">🔒</div>
        <div style="font-weight:800;margin-bottom:6px">خطأ في الاتصال</div>
        <div style="font-size:12px;color:#888">${error.code}</div>
        <button onclick="window.location.href='login.html'" style="margin-top:14px;background:var(--orange);border:none;border-radius:8px;padding:10px 20px;color:#fff;font-weight:800;cursor:pointer">🔐 سجل دخول تاني</button>
      </div>`;
  });
}

onAuthStateChanged(auth, user => {
  authResolved = true;
  if (user) {
    startListening();
    registerPushNotifications(user.uid);
    loadStaffList();
  } else {
    // Firebase Auth مش عارفه — روح login
    window.location.href = 'login.html';
  }
});

// تسجيل الجهاز لاستقبال إشعارات حقيقية (FCM) - شغالة حتى لو التطبيق مقفول تماماً
// بتشتغل بس لو التطبيق شغال كتطبيق أندرويد حقيقي (Capacitor)، مش من متصفح عادي
async function registerPushNotifications(uid) {
  if (!window.Capacitor || !window.Capacitor.isNativePlatform || !window.Capacitor.isNativePlatform()) return;
  const { PushNotifications } = window.Capacitor.Plugins || {};
  if (!PushNotifications) return;

  try {
    let perm = await PushNotifications.checkPermissions();
    if (perm.receive !== 'granted') {
      perm = await PushNotifications.requestPermissions();
    }
    if (perm.receive !== 'granted') {
      console.warn('Push permission not granted');
      return;
    }

    await PushNotifications.register();

    // لما الجهاز يسجل بنجاح، نحفظ "توكن" الجهاز في بيانات المستخدم في Firestore
    PushNotifications.addListener('registration', async (token) => {
      try {
        await updateDoc(doc(db, 'users', uid), {
          fcmToken: token.value,
          fcmUpdatedAt: new Date().toISOString()
        });
      } catch(e) {
        console.error('Failed saving FCM token:', e);
      }
    });

    PushNotifications.addListener('registrationError', (err) => {
      console.error('Push registration error:', err);
    });

    // إشعار وصل والتطبيق مفتوح قدام المستخدم
    PushNotifications.addListener('pushNotificationReceived', (notification) => {
      showNotif('🔔 ' + (notification.title || 'إشعار جديد'));
    });

    // المستخدم دوس على الإشعار (والتطبيق كان مقفول أو في الخلفية)
    PushNotifications.addListener('pushNotificationActionPerformed', (action) => {
      console.log('Push action performed:', action);
    });
  } catch(e) {
    console.error('Push setup error:', e);
  }
}

// لو Firebase لم يرد في 8 ثواني، روح login
setTimeout(() => {
  if (!authResolved) {
    console.warn('Auth timeout - redirecting to login');
    window.location.href = 'login.html';
  }
}, 8000);

// جلب كل المناديب/الأدمنز عشان نقدر نعين عليهم أوردرات
async function loadStaffList() {
  try {
    const snap = await getDocs(collection(db, 'users'));
    staffList = snap.docs.map(d => ({ uid: d.id, ...d.data() }))
      .filter(u => ['driver','admin','super'].includes(u.role));
    renderOrders(); // نعيد رسم الطلبات عشان قائمة التعيين تظهر بأسماء الموظفين صح
  } catch(e) {
    console.error('تعذر تحميل قائمة الموظفين:', e);
  }
}

// فتح/قفل قائمة تعيين المندوب تحت كل أوردر
window.toggleAssignMenu = function(orderId) {
  document.querySelectorAll('.assign-menu').forEach(el => {
    if (el.id !== 'assign-menu-' + orderId) el.style.display = 'none';
  });
  const menu = document.getElementById('assign-menu-' + orderId);
  if (menu) menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
};

window.closeAssignMenu = function(orderId) {
  const menu = document.getElementById('assign-menu-' + orderId);
  if (menu) menu.style.display = 'none';
};

// تعيين أوردر لموظف معين
window.assignOrder = async function(orderId, staffUid, staffName) {
  try {
    await updateDoc(doc(db, 'orders', orderId), {
      assignedTo: staffUid,
      assignedToName: staffName
    });
    closeAssignMenu(orderId);
    showNotif(`✅ اتعين لـ ${staffName}`);
  } catch(e) {
    console.error('فشل التعيين:', e);
    showNotif('❌ حصلت مشكلة في التعيين');
  }
};

function updateStats() {
  const today = new Date().toDateString();
  const todayOrders = allOrders.filter(o => {
    if (!o.createdAt) return false;
    return new Date(o.createdAt.seconds*1000).toDateString() === today;
  });
  document.getElementById('stat-new').textContent      = todayOrders.filter(o=>o.status==='جديد').length;
  document.getElementById('stat-progress').textContent = todayOrders.filter(o=>o.status==='جاري').length;
  document.getElementById('stat-done').textContent     = todayOrders.filter(o=>o.status==='تم').length;
  document.getElementById('stat-all').textContent      = todayOrders.length;
  document.getElementById('total-count').textContent   = allOrders.length + ' طلب';
}

function orderCard(o) {
  // تعقيم أي نص جاي من العميل قبل عرضه، عشان نمنع تنفيذ أي كود HTML/JS
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
  const time = o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '';
  const isNew = o.status === 'جديد';
  const role = window.__altayar_user?.role || 'driver';
  const myUid = window.__altayar_user?.uid || '';
  const canAssign = role === 'super' || role === 'admin'; // مين يقدر يعيّن مندوب
  const canChange = canAssign || (role === 'driver' && o.assignedTo === myUid); // مين يقدر يغيّر حالة الأوردر
  const assignLocked = o.status === 'جاري' || o.status === 'تم' || o.status === 'ملغي'; // بعد ما يبدأ التنفيذ يتقفل التعيين
  const oJson = JSON.stringify(o).replace(/"/g,'&quot;').replace(/'/g,'&#39;');

  return `
  <div class="order-card ${isNew?'new':''}" id="card-${o.id}">
    <div class="order-top">
      <span class="order-id">#${o.id.slice(-6).toUpperCase()}</span>
      <span class="status-badge s-${o.status}">${o.status}</span>

      <div class="dot-menu-wrap">

        <div class="dot-menu" id="menu-${o.id}">
          <button onclick="archiveOrder('${o.id}')">🗂️ أرشفة (إخفاء)</button>
          ${canAssign ? `<button onclick="updateStatus('${o.id}','ملغي');closeMenu('${o.id}')">❌ إلغاء</button>` : ''}
          ${canAssign ? `<button onclick="updateStatus('${o.id}','تم');closeMenu('${o.id}')">✅ تم التوصيل</button>` : ''}

        <div class="addr-item"><span class="addr-icon">🏠</span><span class="addr-text">${esc(o.to) || '-'}</span></div>
      </div>
      <div class="details-text">
        ${esc(o.details) || ''}
        ${o.voiceDetails ? `<div style="margin-top:6px"><div style="font-size:11px;color:var(--text-mid);margin-bottom:4px">🎙️ رسالة صوتية:</div><audio controls src="${o.voiceDetails}" style="width:100%;height:32px;accent-color:var(--orange)"></audio></div>` : ''}
        ${o.voiceFrom    ? `<div style="margin-top:4px"><div style="font-size:11px;color:var(--text-mid);margin-bottom:2px">🎙️ صوت الاستلام:</div><audio controls src="${o.voiceFrom}" style="width:100%;height:32px;accent-color:var(--orange)"></audio></div>` : ''}
        ${o.voiceTo      ? `<div style="margin-top:4px"><div style="font-size:11px;color:var(--text-mid);margin-bottom:2px">🎙️ صوت التوصيل:</div><audio controls src="${o.voiceTo}" style="width:100%;height:32px;accent-color:var(--orange)"></audio></div>` : ''}

        </div>
        ${canAssign ? `
        <div class="assign-menu" id="assign-menu-${o.id}" style="display:none;position:absolute;top:100%;right:0;left:0;z-index:20;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin-top:4px;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)">
          ${staffList.length === 0 ? `<div style="padding:12px;font-size:12px;color:var(--text-mid);text-align:center">مفيش موظفين محمّلين</div>` : staffList.map(s => `

              <span>${s.role==='super'?'👑':s.role==='admin'?'🛡️':'🛵'}</span>

      <div class="order-actions">

      </div>
    </div>
  </div>`;

window.updateStatus = async function(id, status) {
  try {
    await updateDoc(doc(db,'orders',id), { status });
    showNotif(`✅ تم تغيير الحالة لـ "${status}"`);
  } catch(e) { alert('❌ خطأ في التحديث'); }
};

// ── 3 نقط menu ──
window.toggleMenu = function(id) {
  // اغلق كل المنيوهات الثانية
  document.querySelectorAll('.dot-menu.open').forEach(m => {
    if (m.id !== 'menu-'+id) m.classList.remove('open');
  });
  document.getElementById('menu-'+id)?.classList.toggle('open');
};

window.closeMenu = function(id) {
  document.getElementById('menu-'+id)?.classList.remove('open');
};

// إغلاق المنيو لو ضغط برا
document.addEventListener('click', e => {
  if (!e.target.closest('.dot-menu-wrap')) {
    document.querySelectorAll('.dot-menu.open').forEach(m => m.classList.remove('open'));
  }
  if (!e.target.closest('.assign-bar-wrap')) {
    document.querySelectorAll('.assign-menu').forEach(m => m.style.display = 'none');
  }
});

// ── أرشفة (إخفاء محلي) ──
let archivedIds = JSON.parse(localStorage.getItem('altayar_archived') || '[]');

window.archiveOrder = function(id) {
  if (!archivedIds.includes(id)) archivedIds.push(id);
  localStorage.setItem('altayar_archived', JSON.stringify(archivedIds));
  const card = document.getElementById('card-'+id);
  if (card) { card.style.transition='all .3s'; card.style.opacity='0'; card.style.transform='scale(.9)'; setTimeout(()=>card.remove(),300); }
  closeMenu(id);
  showNotif('🗂️ تم إخفاء الأوردر');
};

// renderOrders النهائي - بيراعي الأرشيف والفلتر والبحث
window.renderOrders = function() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let filtered = allOrders.filter(o => {
    if (archivedIds.includes(o.id)) return false;
    if (currentFilter !== 'all' && o.status !== currentFilter) return false;
    if (search && !o.name?.toLowerCase().includes(search) && !o.phone?.includes(search)) return false;
    return true;
  });
  const grid  = document.getElementById('orders-grid');
  const empty = document.getElementById('empty-state');
  if (filtered.length === 0) { grid.style.display='none'; empty.style.display='block'; return; }
  grid.style.display='grid'; empty.style.display='none';
  grid.innerHTML = filtered.map(o => orderCard(o)).join('');
};

// ── واتساب Picker (بدون رقم محدد) ──
window.sendWhatsAppPicker = async function(oJson) {
  let o;
  try { o = JSON.parse(oJson.replace(/&quot;/g,'"').replace(/&#39;/g,"'")); } catch(e){ return; }

  let cfg = {};
  try { const s = JSON.parse(localStorage.getItem('altayar_settings')||'{}'); cfg = s.waSettings||{}; } catch(e){}

  const show    = key => cfg[key] !== false;
  const sep     = cfg.separator  || '━━━━━━━━━━━━━━';
  const header  = cfg.headerText || '🛵 *الطيار ديليفري*';
  const footer  = cfg.footerText || '✅ شكراً للطيار ديليفري ✈️';

  const lines = [];
  if (show('header'))  { lines.push(header); lines.push(sep); }
  if (show('name'))    lines.push(`👤 *العميل:* ${o.name||'-'}`);
  if (show('phone'))   lines.push(`📞 *التليفون:* ${o.phone||'-'}`);
  if (show('from')||show('to')) lines.push(sep);
  if (show('from'))    lines.push(`📦 *الاستلام من:*\n${o.from||'-'}`);
  if (show('to'))      lines.push(`🏠 *التوصيل لـ:*\n${o.to||'-'}`);
  lines.push(sep);
  if (show('details') && o.details) lines.push(`📋 *الطلب:*\n${o.details}`);
  if (show('type')   && o.type)     lines.push(`🏷️ *النوع:* ${o.type}`);
  if (show('amount') && o.amount)   lines.push(`💰 *المبلغ:* ${o.amount} جنيه`);
  if (show('time')   && o.time)     lines.push(`🕐 *الوقت:* ${o.time}`);
  if (show('notes')  && o.notes)    lines.push(`📝 *ملاحظات:* ${o.notes}`);
  if (show('footer')) { lines.push(sep); lines.push(footer); }

  const hasVoice = o.voiceDetails || o.voiceFrom || o.voiceTo;

  if (hasVoice) {
    lines.push('🎙️ *ملاحظة:* في رسالة صوتية مرفوعة مع الطلب');
  }

  const msg = lines.join('\n');

  // لو مفيش صوت، إرسال نص عادي عبر wa.me
  if (!hasVoice) {
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    return;
  }

  // لو في صوت (ممكن يكون أكتر من واحد: استلام / تسليم / تفاصيل)
  const voiceEntries = [
    { data: o.voiceDetails, label: 'تفاصيل الطلب' },
    { data: o.voiceFrom,    label: 'عنوان الاستلام' },
    { data: o.voiceTo,      label: 'عنوان التوصيل' }
  ].filter(v => v.data);

  // نفتح واتساب بالنص (العميل، العنوان، التفاصيل)
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');

  // واتساب بيرفض صيغة الصوت اللي بتتسجل من المتصفح (audio/webm) لو اتبعتت عن طريق المشاركة المباشرة
  // فأضمن طريقة تشتغل دايماً: تنزيل الصوت يدوي وإرفاقه إنت بنفسك في واتساب
  showAudioShareModal(voiceEntries, o);
};

// نافذة تحميل الأصوات: بتعرض بيانات العميل + تحول كل صوت لـ MP3 باسم واضح (اسم العميل - نوع الصوت)
window.showAudioShareModal = function(voiceEntries, order) {
  window.__voiceEntries = voiceEntries;
  window.__voiceOrder = order || {};
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  const o = order || {};
  const itemsHtml = voiceEntries.map((v, i) => `
      <div style="margin-bottom:14px;text-align:right">
        <div style="font-size:12px;color:#888;margin-bottom:6px">🎙️ ${esc(v.label)}</div>
        <audio controls src="${v.data}" style="width:100%;margin-bottom:8px"></audio>
        <button id="dl-btn-${i}" onclick="downloadAsMp3(${i})" style="display:block;width:100%;background:#FF4500;color:#fff;border:none;border-radius:10px;padding:9px;font-weight:800;font-size:13px;cursor:pointer">⬇️ تحميل MP3</button>
      </div>`).join('');
  modal.innerHTML = `
    <div style="background:#1a1a1a;border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center;border:1px solid #2a2a2a;max-height:85vh;overflow-y:auto">
      <div style="font-size:36px;margin-bottom:10px">🎙️</div>
      <div style="background:#111;border-radius:10px;padding:12px;margin-bottom:16px;text-align:right;font-size:13px;line-height:1.8">
        <div>👤 <b>${esc(o.name) || '-'}</b></div>
        <div>📞 ${esc(o.phone) || '-'}</div>
        ${o.from ? `<div>📦 ${esc(o.from)}</div>` : ''}
        ${o.to   ? `<div>🏠 ${esc(o.to)}</div>` : ''}
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:16px">نزّل كل رسالة صوتية وابعتها يدوي (📎) في محادثة واتساب اللي فتحت.</div>
      ${itemsHtml}
      <button onclick="this.closest('div').parentElement.remove()" style="background:#222;border:1px solid #333;color:#fff;border-radius:10px;padding:10px;width:100%;cursor:pointer;font-weight:700;margin-top:6px">إغلاق</button>
    </div>`;
  document.body.appendChild(modal);
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
};

// تحويل الصوت المسجل (webm) لـ MP3 فعلي عن طريق فك التشفير وإعادة الترميز جوه المتصفح
async function convertDataUrlToMp3(dataUrl) {
  const res = await fetch(dataUrl);
  const arrayBuffer = await res.arrayBuffer();
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioCtx();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

  // تحويل لقناة واحدة (mono) لأنه صوت كلام
  let channelData;
  if (audioBuffer.numberOfChannels > 1) {
    const len = audioBuffer.length;
    channelData = new Float32Array(len);
    for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
      const data = audioBuffer.getChannelData(ch);
      for (let i = 0; i < len; i++) channelData[i] += data[i] / audioBuffer.numberOfChannels;
    }
  } else {
    channelData = audioBuffer.getChannelData(0);
  }

  // تحويل من float32 (-1 إلى 1) لـ int16 (الصيغة اللي مطلوبة للترميز)
  const int16 = new Int16Array(channelData.length);
  for (let i = 0; i < channelData.length; i++) {
    const s = Math.max(-1, Math.min(1, channelData[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  const mp3encoder = new lamejs.Mp3Encoder(1, audioBuffer.sampleRate, 128);
  const blockSize = 1152;
  const mp3Data = [];
  for (let i = 0; i < int16.length; i += blockSize) {
    const chunk = int16.subarray(i, i + blockSize);
    const buf = mp3encoder.encodeBuffer(chunk);
    if (buf.length > 0) mp3Data.push(buf);
  }
  const end = mp3encoder.flush();
  if (end.length > 0) mp3Data.push(end);

  audioCtx.close();
  return new Blob(mp3Data, { type: 'audio/mp3' });
}

window.downloadAsMp3 = async function(i) {
  const v = window.__voiceEntries[i];
  const o = window.__voiceOrder || {};
  const btn = document.getElementById('dl-btn-' + i);
  const safe = s => String(s || '').replace(/[\\/:*?"<>|]/g, '').trim();
  const filename = `${safe(o.name) || 'عميل'} - ${safe(v.label)}.mp3`;

  const original = btn.textContent;
  btn.textContent = '⏳ جاري التحويل...';
  btn.style.pointerEvents = 'none';
  try {
    const blob = await convertDataUrlToMp3(v.data);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    btn.textContent = '✅ اتحمل';
  } catch (e) {
    console.error('MP3 convert error:', e);
    // فشل التحويل - ننزل الصوت الأصلي زي ما هو بدل ما نضيّع الرسالة
    const a = document.createElement('a');
    a.href = v.data; a.download = filename.replace('.mp3', '.webm');
    document.body.appendChild(a); a.click(); a.remove();
    btn.textContent = '✅ اتحمل (الصيغة الأصلية)';
  }
  setTimeout(() => { btn.textContent = original; btn.style.pointerEvents = ''; }, 2500);
};

window.callClient = function(phone) {
  if (phone) window.open(`tel:${phone}`);
};

window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
};

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3000);
}

// ── إشعارات Push ──
let notifPermission = false;

async function requestNotifPermission() {
  if (!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  notifPermission = perm === 'granted';
  const btn = document.getElementById('notif-toggle-btn');
  if (btn) {
    btn.textContent = notifPermission ? '🔔 الإشعارات شغالة' : '🔕 فعّل الإشعارات';
    btn.style.background = notifPermission ? 'rgba(34,197,94,.2)' : 'rgba(255,255,255,.1)';
    btn.style.color = notifPermission ? '#22c55e' : '#fff';
  }
}

function sendPushNotif(order) {
  if (!notifPermission) return;
  const n = new Notification('🛵 طلب جديد — الطيار!', {
    body: `👤 ${order.name || 'عميل جديد'}\n📦 ${order.from || ''} ← 🏠 ${order.to || ''}`,
    icon: 'https://raw.githubusercontent.com/saifelsheikh300/altayar-delivery/main/icon.png',
    badge: 'https://raw.githubusercontent.com/saifelsheikh300/altayar-delivery/main/icon.png',
    tag: order.id,
    requireInteraction: true
  });
  n.onclick = () => { window.focus(); n.close(); };
}

// تحديث شكل الزرار بناءً على حالة الإذن الحالية (بدون طلب تلقائي)
(function checkNotifStatus() {
  if (!('Notification' in window)) return;
  notifPermission = Notification.permission === 'granted';
  const btn = document.getElementById('notif-toggle-btn');
  if (btn) {
    btn.textContent      = notifPermission ? '🔔 الإشعارات شغالة' : '🔕 فعّل الإشعارات';
    btn.style.background = notifPermission ? 'rgba(34,197,94,.2)' : 'rgba(255,255,255,.1)';
    btn.style.color      = notifPermission ? '#22c55e' : '#fff';
  }
})();

};

(function(){
