<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطيار — تسجيل الدخول</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',Arial,sans-serif!important}
:root{
  --orange:#FF4500;--orange-dark:#CC3700;--orange-light:#FF6A33;
  --orange-glow:rgba(255,69,0,0.15);
  --bg:#0D0D0D;--card:#1A1A1A;--border:#2A2A2A;
  --text:#F0F0F0;--text-mid:#888;--green:#22c55e;--red:#ef4444;
}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(ellipse at 50% 0%,rgba(255,69,0,0.12) 0%,transparent 60%)}
.login-wrap{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:28px}
.logo-circle{width:110px;height:110px;border-radius:50%;margin:0 auto 14px;overflow:hidden;box-shadow:0 0 0 4px #FF4500,0 0 0 8px rgba(255,69,0,0.2),0 10px 40px rgba(255,69,0,0.5);transition:transform .3s}
.logo-circle:hover{transform:scale(1.05)}
.logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
.logo-name{font-size:26px;font-weight:900;color:var(--text)}
.logo-sub{font-size:12px;color:var(--text-mid);font-weight:600;margin-top:3px;letter-spacing:1px}
.login-card{background:var(--card);border-radius:20px;padding:26px 22px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.card-title{font-size:16px;font-weight:800;margin-bottom:18px;text-align:center}
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.role-btn{background:#111;border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:all .15s}
.role-btn:hover{border-color:var(--orange);background:var(--orange-glow)}
.role-btn.active{background:var(--orange-glow);border-color:var(--orange)}
.role-icon{font-size:20px;display:block;margin-bottom:4px}
.role-label{font-size:11px;font-weight:700;color:var(--text-mid)}
.role-btn.active .role-label{color:var(--orange)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;font-weight:700;color:var(--text-mid)}
.field input{background:#111;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;direction:rtl;transition:border .2s,box-shadow .2s;width:100%;box-sizing:border-box}
.field input:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-glow)}
.field input::placeholder{color:#444}
.pass-wrap{position:relative;width:100%}
.pass-wrap input{padding-left:42px;width:100%;box-sizing:border-box}
.show-pass{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;font-size:16px;color:var(--text-mid)}
.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:var(--red);text-align:center;margin-bottom:14px;display:none}
.error-msg.show{display:block}
.login-btn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 6px 20px rgba(255,69,0,0.38);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn:hover{background:var(--orange-dark)}
.login-btn:active{transform:scale(.98)}
.login-btn.loading{opacity:.7;pointer-events:none}
.hint{font-size:11px;color:var(--text-mid);text-align:center;margin-top:14px;font-weight:500}
</style>
</head>

    <div class="logo-name">الطيار</div>
    <div class="logo-sub">DELIVERY SYSTEM</div>
  </div>
  <div class="login-card">
    <div class="card-title">🔐 تسجيل الدخول</div>
    <div class="role-grid">
      <div class="role-btn" data-role="driver" onclick="selectRole(this)"><span class="role-icon">🛵</span><span class="role-label">مندوب</span></div>
      <div class="role-btn" data-role="admin" onclick="selectRole(this)"><span class="role-icon">🧑‍💼</span><span class="role-label">أدمن</span></div>
      <div class="role-btn active" data-role="super" onclick="selectRole(this)"><span class="role-icon">👑</span><span class="role-label">سوبر أدمن</span></div>
    </div>
    <div class="error-msg" id="error-msg">❌ إيميل أو كلمة مرور غلط</div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="email-inp" placeholder="example@gmail.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <div class="pass-wrap">
        <input type="password" id="pass-inp" placeholder="أدخل كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="show-pass" onclick="togglePass()">👁️</button>
      </div>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <span id="btn-text">دخول</span><span>🚀</span>
    </button>
    <div class="hint">كل دور له صلاحيات مختلفة</div>
  </div>
</div>

<script type="module">
import { initializeApp }                            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuKW9vBGj_q1LIE5QrRtFmpsJ5Ifg6D4w",
  authDomain: "altayar-delivery.firebaseapp.com",
  projectId: "altayar-delivery",
  storageBucket: "altayar-delivery.firebasestorage.app",
  messagingSenderId: "244765017519",
  appId: "1:244765017519:web:62ded292f78c9be40c5b5a"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let selectedRole = 'super';

window.selectRole = function(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRole = btn.dataset.role;
  document.getElementById('error-msg').classList.remove('show');
};

window.togglePass = function() {
  const inp = document.getElementById('pass-inp');
  inp.type = inp.type === 'password' ? 'text' : 'password';
};

window.doLogin = async function() {
  const email    = document.getElementById('email-inp').value.trim();
  const password = document.getElementById('pass-inp').value.trim();
  const errorEl  = document.getElementById('error-msg');
  const btn      = document.getElementById('login-btn');
  const btnText  = document.getElementById('btn-text');

  errorEl.classList.remove('show');
  if (!email || !password) {
    errorEl.textContent = '⚠️ ادخل الإيميل وكلمة المرور';
    errorEl.classList.add('show'); return;
  }

  btn.classList.add('loading'); btnText.textContent = 'جاري التحقق...';

  try {
    // Firebase Auth login
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const uid  = cred.user.uid;

    // جيب الـ role من Firestore
    const userDoc = await getDoc(doc(db, 'users', uid));

    let role = 'driver'; // افتراضي
    let name = email.split('@')[0];
    let canAccess = ['orders.html'];
    let redirect  = 'orders.html';

    if (userDoc.exists()) {
      const data = userDoc.data();
      role      = data.role      || 'driver';
      name      = data.name      || name;
    }

    // تحديد الصلاحيات حسب الـ role
    if (role === 'super') {
      canAccess = ['admin.html','orders.html','index.html'];
      redirect  = 'admin.html';
    } else if (role === 'admin') {
      canAccess = ['orders.html','index.html'];
      redirect  = 'orders.html';
    } else {
      canAccess = ['orders.html'];
      redirect  = 'orders.html';
    }

    // تحقق إن الـ role المختار صح
    const roleAccess = { super: ['admin.html','orders.html'], admin: ['orders.html'], driver: ['orders.html'] };
    if (selectedRole !== role) {
      errorEl.textContent = '❌ الدور المختار مش مطابق لحسابك';
      errorEl.classList.add('show');
      btn.classList.remove('loading'); btnText.textContent = 'دخول';
      return;
    }

    // حفظ الـ session
    sessionStorage.setItem('altayar_user', JSON.stringify({ uid, name, role, canAccess, email }));
    sessionStorage.setItem('altayar_token', await cred.user.getIdToken());

    window.location.href = redirect;

  } catch(e) {
    console.error(e);
    let msg = '❌ إيميل أو كلمة مرور غلط';
    if (e.code === 'auth/too-many-requests') msg = '⚠️ كتير أوي، استنى شوية';
    if (e.code === 'auth/network-request-failed') msg = '⚠️ تحقق من الإنترنت';
    errorEl.textContent = msg;
    errorEl.classList.add('show');
    btn.classList.remove('loading'); btnText.textContent = 'دخول';
  }
};
</script>
</body>
</html>
